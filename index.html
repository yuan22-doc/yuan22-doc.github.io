<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>自定义轮播背景网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 背景轮播容器 */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1.5s ease-in-out;
        }

        /* 半透明遮罩，防止背景太花 */
        .mask {
            background-color: rgba(255, 255, 255, 0.75);
            min-height: 100vh;
        }

        header {
            background:rgba(44, 62, 80, 0.65);
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .box {
            background:rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px #ddd;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        p {
            line-height: 1.8;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <!-- 背景轮播层 -->
    <div class="bg-slideshow"></div>

    <div class="mask">
        <header>
            <h1>袁孟海的个人网站</h1>
            <p>自定义图片 · 自动切换 · 唯美过渡</p>
        </header>

        <div class="container">
            <div class="box">
                <h2>欢迎来到我的专属网站</h2>
                <p>后台设置了一些我收集的插画，可以自动轮流切换。</p>
                <p>切换速度、图片数量都可以随便改。</p>
            </div>
            <div class="box">
                <h2>个人空间</h2>
                <p>明日方舟</p>
            </div>
        </div>

        <footer>
            © 2026 我的个人网站
        </footer>
    </div>

    <script>
        // 👉 在这里改成你自己的图片文件名
        const imgs = [
            "img1.jpg",
            "img2.jpg",
            "img3.jpg"
        ];

        let index = 0;
        const bg = document.querySelector(".bg-slideshow");

        // 切换背景函数
        function changeBg() {
            bg.style.backgroundImage = `url(${imgs[index]})`;
            index = (index + 1) % imgs.length;
        }

        // 初始加载第一张
        changeBg();
        // 每 5秒 切换一张（可改数字）
        setInterval(changeBg, 5000);
    </script>
</body>
</html>
