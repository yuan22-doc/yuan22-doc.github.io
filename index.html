<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>背景高清轮播网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 背景轮播 - 高清完整显示 */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1.8s ease-in-out;
            filter: none;
        }

        /* 遮罩改很淡，最大化凸显背景 */
        .mask {
            background-color: rgba(255, 255, 255, 0.25);
            min-height: 100vh;
        }

        header {
            background:rgba(0, 0, 0, 0.35);
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .box {
            background:rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        /* 头像样式 */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        h2 {
            margin-bottom: 15px;
            color: #222;
        }

        p {
            line-height: 1.8;
            margin-bottom: 10px;
            color: #111;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #222;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <!-- 背景轮播层 -->
    <div class="bg-slideshow"></div>

    <div class="mask">
        <header>
            <h1>多张背景自动轮播</h1>
            <p>背景高清显示 · 画面更突出</p>
        </header>

        <div class="container">
            <div class="box">
                <div>
                    <h2>欢迎来到我的专属网站</h2>
                    <p>背景图片已增强显示，画面清晰显眼。</p>
                    <p>多张图片自动轮流切换，过渡柔和。</p>
                </div>
                <!-- 右侧头像 -->
                <img src="avatar1.jpg" class="avatar" alt="头像">
            </div>

            <div class="box">
                <!-- 左侧头像 -->
                <img src="avatar2.jpg" class="avatar" alt="头像">
                <div>
                    <h2>个人空间</h2>
                    <p>放上你喜欢的风景、自拍、插画当背景～</p>
                </div>
            </div>
        </div>

        <footer>
            © 2026 我的个人网站
        </footer>
    </div>

    <script>
        // 放入你的背景图：img1.jpg、img2.jpg、img3.jpg
        const imgs = [
            "img1.jpg",
            "img2.jpg",
            "img3.jpg"
        ];

        let index = 0;
        const bg = document.querySelector(".bg-slideshow");

        function changeBg() {
            bg.style.backgroundImage = `url(${imgs[index]})`;
            index = (index + 1) % imgs.length;
        }

        changeBg();
        // 5秒切换一张，需要改速度直接改数字
        setInterval(changeBg, 5000);
    </script>
</body>
</html>
